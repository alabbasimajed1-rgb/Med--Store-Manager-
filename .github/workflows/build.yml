name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
      
      - name: Create Flutter project
        run: |
          flutter create --org com.medstore --project-name med_store_manager --platforms=android .
          rm lib/main.dart
      
      - name: Fix Gradle + Manifest
        run: |
          # 1. Fix kotlin version
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          
          # 2. Fix settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle
          
          # 3. Fix app/build.gradle - add namespace + versions
          sed -i '/defaultConfig {/a \        namespace "com.medstore.med_store_manager"' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle
          
          # 4. Add notification permissions to AndroidManifest
          sed -i '/<\/application>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' android/app/src/main/AndroidManifest.xml
      
      - name: Restore your files
        run: |
          git checkout HEAD -- lib/main.dart pubspec.yaml
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Debug APK
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Med-Store-Manager-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
